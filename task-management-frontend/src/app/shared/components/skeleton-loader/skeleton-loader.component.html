<div [ngClass]="{
  'skeleton-grid-cards': type === 'card',
  'skeleton-grid-stats': type === 'stats',
  'skeleton-list': type === 'list',
  'skeleton-detail': type === 'detail'
}">
  @for (item of countArray; track $index) {
    @if (type === 'card') {
      <div class="skeleton-card">
        <div class="skeleton-avatar shimmer"></div>
        <div class="skeleton-title shimmer"></div>
        <div class="skeleton-text shimmer"></div>
        <div class="skeleton-text shimmer" style="width: 60%"></div>
        <div class="skeleton-footer">
          <div class="skeleton-btn shimmer"></div>
          <div class="skeleton-btn shimmer"></div>
        </div>
      </div>
    } @else if (type === 'stats') {
      <div class="skeleton-stat-card">
        <div class="skeleton-circle shimmer"></div>
        <div class="skeleton-info">
          <div class="skeleton-title shimmer" style="width: 40px; height: 28px; margin-bottom: 4px;"></div>
          <div class="skeleton-text shimmer" style="width: 80px; height: 14px;"></div>
        </div>
      </div>
    } @else if (type === 'list') {
      <div class="skeleton-list-item">
        <div class="skeleton-line shimmer" style="width: 70%; height: 20px;"></div>
        <div class="skeleton-line shimmer" style="width: 30%; height: 14px; margin-top: 8px;"></div>
      </div>
    } @else if (type === 'detail') {
      <div class="skeleton-detail-view">
        <div class="skeleton-line shimmer" style="width: 40%; height: 32px; margin-bottom: 20px;"></div>
        <div class="skeleton-line shimmer" style="width: 90%; height: 18px; margin-bottom: 10px;"></div>
        <div class="skeleton-line shimmer" style="width: 80%; height: 18px; margin-bottom: 10px;"></div>
        <div class="skeleton-line shimmer" style="width: 50%; height: 18px; margin-bottom: 30px;"></div>
        <div class="skeleton-grid-three">
          <div class="skeleton-card shimmer" style="height: 120px;"></div>
          <div class="skeleton-card shimmer" style="height: 120px;"></div>
          <div class="skeleton-card shimmer" style="height: 120px;"></div>
        </div>
      </div>
    }
  }
</div>
