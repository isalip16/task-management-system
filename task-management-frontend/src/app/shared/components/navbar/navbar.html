<nav class="navbar">
    <div class="navbar-container">
        <a class="navbar-brand" routerLink="/dashboard">
            <span class="brand-icon">+</span>
            Task Flow
        </a>

        <ul class="nav-links">
            <li>
                <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                    Dashboard
                </a>
            </li>
            <li>
                <a routerLink="/projects" routerLinkActive="active">
                    Projects
                </a>
            </li>
            <li>
                <a routerLink="/tasks" routerLinkActive="active">
                    Tasks
                </a>
            </li>
        </ul>

        <div class="navbar-right">
            <span class="user-greeting">Hello, {{ firstName }}</span>
            <button class="btn-logout" (click)="logout()">Logout</button>

            <button class="hamburger" (click)="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>

    @if (menuOpen){
    <div class="mobile-menu">
        <a routerLink="/dashboard" routerLinkActive="active" (click)="menuOpen = false">
            Dashboard
        </a>
        <a routerLink="/projects" routerLinkActive="active" (click)="menuOpen = false">
            Projects
        </a>
        <a routerLink="/tasks" routerLinkActive="active" (click)="menuOpen = false">
            Tasks
        </a>
        <button class="btn-logout-mobile" (click)="logout()">Logout</button>
    </div>
    }
</nav>
