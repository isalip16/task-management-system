<div class="app-layout">
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="brand-text">TaskFlow</span>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
        <span class="pi pi-home nav-icon"></span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/projects" routerLinkActive="active" class="nav-item">
        <span class="pi pi-folder nav-icon"></span>
        <span class="nav-label">Workspaces</span>
      </a>
    </nav>

    <div class="sidebar-footer" *ngIf="currentUser">
      <div class="user-info">
        <div class="user-avatar">
          {{ currentUser.name.charAt(0).toUpperCase() }}
        </div>
        <div class="user-details">
          <span class="user-name">{{ currentUser.name }}</span>
          <span class="user-email">{{ currentUser.email }}</span>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()" title="Logout">
        <span class="pi pi-sign-out"></span>
      </button>
    </div>
  </aside>

  <!-- Main Content Panel -->
  <div class="layout-container">
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
